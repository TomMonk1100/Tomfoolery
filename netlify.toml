# Build config lives here (repo-versioned) so it can't drift from the
# Netlify dashboard. Missing build command/publish dir caused the
# 2026-07-02 sitewide 404.
[build]
  command = "npm run build"
  publish = "dist"

# Moon Lander leaderboard function (/api/scores). Bundled by esbuild at
# build time; @netlify/blobs comes from package.json dependencies.
# (node_bundler = "none" broke the function once builds moved to git —
# the unbundled import of @netlify/blobs crashed at runtime.)
[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

# Coffee/Photos/Retreats collections were folded into the "Now" blog
# (2026-07-03 IA prune). Old links redirect instead of 404ing.
[[redirects]]
  from = "/coffee"
  to = "/now"
  status = 301

[[redirects]]
  from = "/coffee/*"
  to = "/now"
  status = 301

[[redirects]]
  from = "/photos"
  to = "/now"
  status = 301

[[redirects]]
  from = "/photos/*"
  to = "/now"
  status = 301

[[redirects]]
  from = "/retreats"
  to = "/now"
  status = 301

[[redirects]]
  from = "/retreats/*"
  to = "/now"
  status = 301
