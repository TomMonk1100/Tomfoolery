<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <meta name="theme-color" content="#102016" />
    <title>Understory</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #0b1710;
        --panel: #18291d;
        --line: #58724a;
        --gold: #f0c95a;
        --cream: #f7ecd0;
        --muted: #b7c7a0;
      }
      html, body {
        margin: 0;
        padding: 0;
        height: 100%;
        background:
          radial-gradient(circle at 20% 12%, rgba(240, 201, 90, 0.14), transparent 26rem),
          radial-gradient(circle at 78% 78%, rgba(101, 164, 89, 0.18), transparent 24rem),
          linear-gradient(145deg, var(--bg) 0%, #102016 48%, #07100b 100%);
        overflow: hidden;
        overscroll-behavior: none;
        touch-action: none;
        -webkit-user-select: none;
        user-select: none;
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
        color: var(--cream);
      }
      body::before {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
        background-image:
          linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
        background-size: 38px 38px;
        mask-image: radial-gradient(circle at center, black, transparent 78%);
      }
      .stage {
        width: 100vw;
        height: 100dvh;
        display: grid;
        grid-template-columns: minmax(0, 1fr) minmax(360px, 480px) minmax(0, 1fr);
        align-items: center;
        gap: clamp(16px, 4vw, 54px);
        padding: clamp(14px, 3vw, 40px);
        box-sizing: border-box;
      }
      .side {
        max-width: 280px;
        align-self: center;
        opacity: 0.92;
      }
      .side h1 {
        margin: 0 0 12px;
        font-size: clamp(28px, 4vw, 48px);
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--cream);
        text-shadow: 0 2px 0 #000;
      }
      .side p {
        margin: 0 0 18px;
        color: var(--muted);
        line-height: 1.55;
        font-size: 14px;
      }
      .keygrid {
        display: grid;
        gap: 8px;
        padding: 14px;
        border: 1px solid rgba(240, 201, 90, 0.35);
        background: rgba(24, 41, 29, 0.72);
        box-shadow: 0 18px 60px rgba(0, 0, 0, 0.35);
      }
      .keygrid div {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        color: var(--muted);
        font-size: 12px;
      }
      .keygrid b {
        color: var(--gold);
        font-weight: 700;
      }
      #game {
        width: min(100%, calc((100dvh - 80px) * 480 / 854));
        height: min(calc(100dvh - 80px), calc(100vw * 854 / 480));
        min-width: 0;
        justify-self: center;
        display: flex;
        align-items: center;
        justify-content: center;
        position: relative;
        border: 2px solid rgba(240, 201, 90, 0.55);
        box-shadow:
          0 0 0 6px rgba(13, 28, 17, 0.84),
          0 24px 90px rgba(0, 0, 0, 0.55),
          inset 0 0 0 1px rgba(255, 255, 255, 0.08);
        background: #0d1d12;
      }
      #game::after {
        content: "";
        position: absolute;
        inset: 0;
        pointer-events: none;
        box-shadow: inset 0 0 54px rgba(0, 0, 0, 0.32);
      }
      canvas {
        display: block;
        margin: 0 !important;
      }
      @media (max-width: 860px) {
        .stage {
          display: block;
          padding: 0;
        }
        .side {
          display: none;
        }
        #game {
          width: 100vw;
          height: 100dvh;
          border: 0;
          box-shadow: none;
          align-items: flex-start;
        }
      }
    </style>
  </head>
  <body>
    <main class="stage">
      <aside class="side" aria-hidden="true">
        <h1>Understory</h1>
        <p>A small wild life: forage, fight, grow, and bring food home before the long dark.</p>
        <div class="keygrid">
          <div><b>WASD / arrows</b><span>move</span></div>
          <div><b>mouse drag</b><span>joystick</span></div>
          <div><b>click / tap</b><span>choose</span></div>
          <div><b>hold</b><span>focus</span></div>
        </div>
      </aside>
      <div id="game" aria-label="Understory game"></div>
      <aside class="side" aria-hidden="true">
        <p><strong style="color: var(--gold)">Auto-attacks are always on.</strong> Your job is movement: kite danger, collect XP, and stay fed.</p>
        <p><strong style="color: var(--gold)">Visual build:</strong> canopy-desktop-v1</p>
      </aside>
    </main>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
